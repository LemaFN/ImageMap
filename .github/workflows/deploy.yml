name: Build Plugin and Deploy Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-and-build"
  cancel-in-progress: false

jobs:
  # JOB 1: Kompiliert dein Minecraft-Java-Plugin zu einer .jar Datei
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package

      - name: Upload Finished Jar
        uses: actions/upload-artifact@v4
        with:
          name: ImageCanvas-Plugin
          path: target/*.jar

  # JOB 2: Lädt deine Webseite auf GitHub Pages hoch
  deploy-pages:
    needs: build-jar # Wartet, bis der Java-Build fertig ist
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
