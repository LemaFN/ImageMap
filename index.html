<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageCanvas - Web Uploader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #4caf50;
            margin-top: 0;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 6px;
            background-color: #252525;
            color: #fff;
            box-sizing: border-box;
        }
        .grid-inputs {
            display: flex;
            gap: 10px;
        }
        .grid-inputs div {
            flex: 1;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4caf50;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .success {
            background-color: #1b5e20;
            color: #c8e6c9;
            border: 1px solid #2e7d32;
        }
        .error {
            background-color: #b71c1c;
            color: #ffcdd2;
            border: 1px solid #c62828;
        }
        .copy-box {
            background-color: #2d2d2d;
            padding: 12px;
            border-radius: 4px;
            font-family: monospace;
            word-break: break-all;
            margin-top: 10px;
            border: 1px dashed #4caf50;
            cursor: pointer;
            color: #a3e2a5;
            text-align: center;
        }
        .copy-box:hover {
            background-color: #383838;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🖼️ ImageCanvas Uploader</h1>
    <p style="text-align: center; color: #aaa;">Lade dein Bild hoch und generiere den In-Game Befehl</p>
    
    <hr style="border: 0; border-top: 1px solid #333; margin-bottom: 20px;">

    <div class="form-group">
        <label for="imgFile">Bild vom PC/Handy auswählen</label>
        <input type="file" id="imgFile" accept="image/*">
    </div>

    <div class="form-group">
        <label for="imgName">Eindeutiger Name für das Bild</label>
        <input type="text" id="imgName" placeholder="z.B. mein_bild_1">
    </div>

    <div class="form-group">
        <label>Größe der Leinwand (Anzahl an Minecraft-Karten)</label>
        <div class="grid-inputs">
            <div>
                <label for="cols" style="font-size: 12px; color: #aaa;">Breite (Spalten)</label>
                <input type="number" id="cols" value="3" min="1" max="30">
            </div>
            <div>
                <label for="rows" style="font-size: 12px; color: #aaa;">Höhe (Zeilen)</label>
                <input type="number" id="rows" value="3" min="1" max="30">
            </div>
        </div>
    </div>

    <button id="uploadBtn" onclick="uploadAndGenerate()">Befehl generieren</button>

    <div id="statusBox" class="status">
        <div id="statusMessage"></div>
        <div id="commandOutput" class="copy-box" style="display: none;" onclick="copyToClipboard()"></div>
    </div>
</div>

<script>
let generatedCommand = "";

async function uploadAndGenerate() {
    const fileInput = document.getElementById('imgFile');
    const nameInput = document.getElementById('imgName');
    const cols = document.getElementById('cols').value;
    const rows = document.getElementById('rows').value;
    
    const statusBox = document.getElementById('statusBox');
    const statusMessage = document.getElementById('statusMessage');
    const commandOutput = document.getElementById('commandOutput');
    const uploadBtn = document.getElementById('uploadBtn');

    const file = fileInput.files[0];
    const name = nameInput.value.trim().replace(/[^a-zA-Z0-9_]/g, ""); // Säubert den Namen von Sonderzeichen

    if (!file || !name || !cols || !rows) {
        showStatus('Bitte fülle alle Felder aus und wähle ein Bild!', 'error');
        return;
    }

    uploadBtn.disabled = true;
    uploadBtn.innerText = 'Wird hochgeladen...';
    showStatus('Bild wird verarbeitet und sicher im Web gespeichert...', 'success');

    // Wir nutzen den kostenlosen, anonymen Hoster freeimage.host über ein CORS-Proxy, um dein Bild hochzuladen
    const reader = new FileReader();
    reader.onloadend = async function() {
        const base64String = reader.result.split(',')[1];
        
        const formData = new FormData();
        formData.append('key', '6d207e02198a847aa98d4a2a1154857a'); // Öffentlicher API-Key für freeimage.host
        formData.append('action', 'upload');
        formData.append('source', base64String);
        formData.append('format', 'json');

        try {
            const response = await fetch('https://api.freeimage.host/1/upload', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (response.ok && data.image && data.image.url) {
                const directImageUrl = data.image.url;
                
                // Hier bauen wir den exakten Minecraft-Befehl zusammen!
                generatedCommand = `/imagecanvas create ${name} ${directImageUrl} ${cols}x${rows}`;
                
                statusMessage.innerHTML = `<strong>Upload abgeschlossen!</strong><br>Klicke auf das grüne Feld unten, um den Befehl zu kopieren. Füge ihn danach einfach im Minecraft-Chat ein!`;
                commandOutput.innerText = generatedCommand;
                commandOutput.style.display = 'block';
                statusBox.className = 'status success';
            } else {
                showStatus('Fehler beim Bilder-Upload: ' + (data.error ? data.error.message : 'Unbekannter Hoster-Fehler'), 'error');
            }
        } catch (error) {
            showStatus('Netzwerkfehler beim Hochladen des Bildes. Bitte versuche es noch einmal.', 'error');
            console.error(error);
        } finally {
            uploadBtn.disabled = false;
            uploadBtn.innerText = 'Befehl generieren';
        }
    };
    reader.readAsDataURL(file);
}

function copyToClipboard() {
    if (!generatedCommand) return;
    navigator.clipboard.writeText(generatedCommand);
    alert('Befehl wurde in die Zwischenablage kopiert! Füge ihn mit STRG+V in Minecraft ein.');
}

function showStatus(text, type) {
    const statusBox = document.getElementById('statusBox');
    const statusMessage = document.getElementById('statusMessage');
    const commandOutput = document.getElementById('commandOutput');
    
    statusMessage.innerText = text;
    commandOutput.style.display = 'none';
    statusBox.style.display = 'block';
    statusBox.className = 'status ' + type;
}
</script>

</body>
</html>
