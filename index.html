<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageCanvas - Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #4caf50;
            margin-top: 0;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 6px;
            background-color: #252525;
            color: #fff;
            box-sizing: border-box;
        }
        input[type="file"] {
            padding: 8px;
            cursor: pointer;
        }
        .grid-inputs {
            display: flex;
            gap: 10px;
        }
        .grid-inputs div {
            flex: 1;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4caf50;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .success {
            background-color: #1b5e20;
            color: #c8e6c9;
            border: 1px solid #2e7d32;
        }
        .error {
            background-color: #b71c1c;
            color: #ffcdd2;
            border: 1px solid #c62828;
        }
        .output-box {
            background-color: #2d2d2d;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            word-break: break-all;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🖼️ ImageCanvas Uploader</h1>
    <p style="text-align: center; color: #aaa;">Lade eigene Bilder direkt in deinen Minecraft-Server</p>
    
    <hr style="border: 0; border-top: 1px solid #333; margin-bottom: 20px;">

    <div class="form-group">
        <label for="serverIp">Minecraft-Server IP / Domain (inkl. Port)</label>
        <input type="text" id="serverIp" value="localhost:8080" placeholder="z.B. meine-server-ip.de:8080">
    </div>

    <div class="form-group">
        <label for="imgFile">Bild auswählen (PNG, JPG)</label>
        <input type="file" id="imgFile" accept="image/*">
    </div>

    <div class="form-group">
        <label for="imgName">Eindeutiger Name für das Bild</label>
        <input type="text" id="imgName" placeholder="z.B. spawnbild_gross">
    </div>

    <div class="form-group">
        <label>Eigene Leinwand-Größe (Anzahl der Karten)</label>
        <div class="grid-inputs">
            <div>
                <label for="cols" style="font-size: 12px; color: #aaa;">Breite (Spalten)</label>
                <input type="number" id="cols" value="3" min="1" max="20">
            </div>
            <div>
                <label for="rows" style="font-size: 12px; color: #aaa;">Höhe (Zeilen)</label>
                <input type="number" id="rows" value="3" min="1" max="20">
            </div>
        </div>
    </div>

    <button id="sendBtn" onclick="processAndSend()">Bild an Server senden</button>

    <div id="statusBox" class="status">
        <div id="statusMessage"></div>
        <div id="statusOutput" class="output-box" style="display: none;"></div>
    </div>
</div>

<script>
function processAndSend() {
    const fileInput = document.getElementById('imgFile');
    const file = fileInput.files[0];

    if (!file) {
        showStatus('Bitte wähle zuerst eine Bild-Datei von deinem PC aus!', 'error');
        return;
    }

    // Wir lesen die Datei ein und konvertieren sie in Text (Base64)
    const reader = new FileReader();
    reader.onloadend = async function() {
        const base64String = reader.result.split(',')[1]; // Holt den reinen Base64-Code ohne Header
        await sendToMinecraft(base64String);
    };
    reader.readAsDataURL(file);
}

async function sendToMinecraft(base64Data) {
    const serverIp = document.getElementById('serverIp').value.trim();
    const name = document.getElementById('imgName').value.trim();
    const cols = document.getElementById('cols').value;
    const rows = document.getElementById('rows').value;
    
    const statusBox = document.getElementById('statusBox');
    const statusMessage = document.getElementById('statusMessage');
    const statusOutput = document.getElementById('statusOutput');
    const sendBtn = document.getElementById('sendBtn');

    if (!name || !serverIp || !cols || !rows) {
        showStatus('Bitte fülle alle Textfelder aus!', 'error');
        return;
    }

    sendBtn.disabled = true;
    sendBtn.innerText = 'Verarbeite und sende...';
    showStatus('Bild wird komprimiert und an Minecraft übertragen...', 'success');

    const formData = new URLSearchParams();
    formData.append('image_data', base64Data); // Wir senden die nackten Bilddaten!
    formData.append('name', name);
    formData.append('cols', cols);
    formData.append('rows', rows);

    try {
        const response = await fetch(`http://${serverIp}/upload`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData.toString()
        });

        const data = await response.json();

        if (response.ok && data.status === 'success') {
            statusMessage.innerHTML = `<strong>Erfolg!</strong> ${data.message}<br><br><strong>Generierte Map-IDs:</strong>`;
            statusOutput.innerText = data.ids;
            statusOutput.style.display = 'block';
            statusBox.className = 'status success';
        } else {
            showStatus('Server-Fehler: ' + (data.error || 'Unbekannter Fehler'), 'error');
        }

    } catch (error) {
        showStatus('Konnte keine Verbindung zum Minecraft-Server herstellen. Läuft dein Plugin? Port ' + serverIp.split(':')[1] + ' offen?', 'error');
        console.error(error);
    } finally {
        sendBtn.disabled = false;
        sendBtn.innerText = 'Bild an Server senden';
    }
}

function showStatus(text, type) {
    const statusBox = document.getElementById('statusBox');
    const statusMessage = document.getElementById('statusMessage');
    const statusOutput = document.getElementById('statusOutput');
    
    statusMessage.innerText = text;
    statusOutput.style.display = 'none';
    statusBox.style.display = 'block';
    statusBox.className = 'status ' + type;
}
</script>

</body>
</html>
